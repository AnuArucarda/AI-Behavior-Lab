name: Build AI-Behavior-Lab
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Fetch Xposed API and Build
        run: |
          mkdir -p app/libs
          wget -O app/libs/XposedBridgeApi-82.jar https://github.com
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: AI-Behavior-Lab-Release
          path: app/build/outputs/apk/release/*.apk
