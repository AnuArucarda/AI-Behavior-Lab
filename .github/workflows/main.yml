name: Build AI-Behavior-Lab
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Wrapper & Dependencies
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/XposedBridgeApi-82.jar https://github.com/rovo89/XposedBridge/raw/master/jar/XposedBridgeApi-82.jar
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: AI-Behavior-Lab-APK
          path: app/build/outputs/apk/release/*.apk
