name: Build AI-Behavior-Lab
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Direct Download Missing API
        run: |
          mkdir -p app/libs
          wget -O app/libs/XposedBridgeApi-82.jar https://github.com

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI-Behavior-Lab-Release
          path: app/build/outputs/apk/release/*.apk
