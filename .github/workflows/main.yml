name: Build AI-Behavior-Lab
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Modern Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fetch Xposed API (Modern Remote)
        run: |
          mkdir -p app/libs
          wget -q https://github.com -O app/libs/XposedBridgeApi-82.jar

      - name: Modern Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Modern Upload
        uses: actions/upload-artifact@v4
        with:
          name: AI-Behavior-Lab-Release
          path: app/build/outputs/apk/release/*.apk
