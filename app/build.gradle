plugins {
    id 'com.android.application'
}

android {
    namespace 'com.research.ai_behavior_lab'
    compileSdk 35

    defaultConfig {
        applicationId "com.research.ai_behavior_lab"
        minSdk 33
        targetSdk 35
        versionCode 1777840175
        versionName "1.0"
    }
}

dependencies {
    // This tells Gradle to look for any JARs in the libs folder
    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'org.lsposed.hiddenapibypass:hiddenapibypass:4.3'
}
