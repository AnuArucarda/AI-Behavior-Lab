plugins {
    id 'com.android.application'
}

android {
    namespace 'com.research.ai_behavior_lab'
    compileSdk 35

    defaultConfig {
        applicationId "com.research.ai_behavior_lab"
        minSdk 33 // Pixel 7 launched with Android 13
        targetSdk 35
        versionCode 1777834644
        versionName "1.0503"
        
        // Ensure 64-bit support for Tensor chips
        ndk {
            abiFilters "arm64-v8a"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    compileOnly 'org.lsposed.lsplugin:lsplugin-api:1.6.2'
    implementation 'org.lsposed.hiddenapibypass:hiddenapibypass:4.3'
}
