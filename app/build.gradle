plugins {
    id 'com.android.application'
}

android {
    namespace 'com.research.ai_behavior_lab'
    compileSdk 35

    defaultConfig {
        applicationId "com.research.ai_behavior_lab"
        minSdk 26
        targetSdk 35
        versionCode 1777823195
        versionName "1.0503.1146"
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly 'org.lsposed.lsposed:api:1.0.0'
}
