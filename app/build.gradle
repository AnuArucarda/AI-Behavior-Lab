plugins {
    id 'com.android.application'
}

android {
    namespace 'com.research.ai_behavior_lab'
    compileSdk 35

    defaultConfig {
        applicationId "com.research.ai_behavior_lab"
        minSdk 33
        targetSdk 35
        versionCode 1777840336
        versionName "1.0"
    }
}

dependencies {
    // Official LSPosed API from Maven Central (No JAR file needed)
    compileOnly 'io.github.libxposed:api:1.0.0'
    implementation 'org.lsposed.hiddenapibypass:hiddenapibypass:4.3'
}
